<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VAULT — DeFi yield optimizer — APY router with IL adjustment</title>
<style>
* {{ box-sizing: border-box; }}
body {{
  font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  margin: 0; padding: 2rem; background: #0d1117; color: #c9d1d9;
  max-width: 900px; margin: 0 auto;
}}
h1 {{ color: #58a6ff; font-size: 1.75rem; margin-bottom: 0.25rem; }}
.tag {{ color: #8b949e; font-size: 0.9rem; margin-bottom: 2rem; }}
pre {{ background: #161b22; padding: 1rem; border-radius: 6px; overflow-x: auto; font-size: 0.85rem; }}
canvas {{ background: #161b22; border-radius: 6px; width: 100%; max-width: 800px; }}
.section {{ margin: 2rem 0; }}
.badge {{
  display: inline-block; padding: 0.2rem 0.6rem;
  background: #1f6feb33; color: #58a6ff; border-radius: 12px;
  font-size: 0.75rem; margin-right: 0.5rem;
}}
a {{ color: #58a6ff; }}
.metric-grid {{ display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin: 1rem 0; }}
.metric {{ background: #161b22; padding: 1rem; border-radius: 6px; }}
.metric-val {{ font-size: 1.5rem; font-weight: 600; color: #f0f6fc; }}
.metric-lbl {{ font-size: 0.75rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; }}
</style>
</head>
<body>

<h1>VAULT</h1>
<p class="tag">DeFi yield optimizer — APY router with IL adjustment</p>
<p>
  <span class="badge">yield</span>
  <span class="badge">defi</span>
  <span class="badge">crypto</span>
</p>

<div class="section">
  <h2>Sample output</h2>
  <pre id="output">{
  "result": "see live API"
}</pre>
</div>

<div class="section">
  <h2>Time-series view</h2>
  <canvas id="chart" width="800" height="300"></canvas>
</div>

<div class="metric-grid">
  <div class="metric"><div class="metric-val" id="m1">0</div><div class="metric-lbl">Events</div></div>
  <div class="metric"><div class="metric-val" id="m2">0.0</div><div class="metric-lbl">Mean Z</div></div>
  <div class="metric"><div class="metric-val" id="m3">0</div><div class="metric-lbl">Anomalies</div></div>
</div>

<div class="section">
  <p>Source: <a href="https://github.com/sudirjahandi148/vault">github.com/sudirjahandi148/vault</a></p>
</div>

<script>
// Generate synthetic time-series for demo
function genSeries(n) {{
  const out = [];
  let mean = 50;
  for (let i = 0; i < n; i++) {{
    const noise = (Math.random() - 0.5) * 10;
    let v = mean + noise;
    if (i === 50 || i === 120) v = mean + 80;  // inject anomalies
    out.push(v);
  }}
  return out;
}}

function rollingZ(series, window) {{
  const result = [];
  for (let i = 0; i < series.length; i++) {{
    const w = series.slice(Math.max(0, i - window), i);
    if (w.length < 5) {{ result.push(0); continue; }}
    const mean = w.reduce((a, b) => a + b) / w.length;
    const variance = w.reduce((a, b) => a + (b - mean) ** 2, 0) / w.length;
    const std = Math.sqrt(variance);
    result.push(std > 0 ? (series[i] - mean) / std : 0);
  }}
  return result;
}}

const n = 200;
const series = genSeries(n);
const zScores = rollingZ(series, 20);
const anomalyCount = zScores.filter(z => Math.abs(z) > 3).length;
const meanZ = zScores.reduce((a, b) => a + b) / zScores.length;

document.getElementById('m1').textContent = n;
document.getElementById('m2').textContent = meanZ.toFixed(2);
document.getElementById('m3').textContent = anomalyCount;

// Render chart
const canvas = document.getElementById('chart');
const ctx = canvas.getContext('2d');
const W = canvas.width;
const H = canvas.height;

// Background
ctx.fillStyle = '#161b22';
ctx.fillRect(0, 0, W, H);

// Series line
ctx.strokeStyle = '#58a6ff';
ctx.lineWidth = 1.5;
ctx.beginPath();
const min = Math.min(...series);
const max = Math.max(...series);
const range = max - min;
series.forEach((v, i) => {{
  const x = (i / (n - 1)) * W;
  const y = H - ((v - min) / range) * (H - 40) - 20;
  if (i === 0) ctx.moveTo(x, y);
  else ctx.lineTo(x, y);
}});
ctx.stroke();

// Highlight anomalies
ctx.fillStyle = '#f85149';
zScores.forEach((z, i) => {{
  if (Math.abs(z) > 3) {{
    const x = (i / (n - 1)) * W;
    const y = H - ((series[i] - min) / range) * (H - 40) - 20;
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fill();
  }}
}});
</script>

</body>
</html>
